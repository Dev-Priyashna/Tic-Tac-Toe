<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="token-container">
        <div id="playerXTokens" class="token-box">0</div>
        <div id="playerOTokens" class="token-box">0</div>
        <div id="vsComputerTokens" class="token-box">0</div>
    </div>
    
    <div class="start-screen">
        <h1 id="startTitle">Tic Tac Toe</h1>
        <button id="twoPlayer">2 Player</button>
        <button id="vsComputer">Vs Computer</button>

        <!-- NEW: difficulty buttons, hidden at first -->
        <div id="difficultyOptions" class="hide">
            <button id="easy">Easy</button>
            <button id="medium">Medium</button>
            <button id="hard">Hard</button>
        </div>

    </div>

    


    <div class="game-container hide">
        

        <h1>Tic Tac Toe</h1>

        <!-- Status: Turn / Winner -->
        <div class="status"></div>

        <!-- Game Board -->
        <div class="board">
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="tile"></div>
            <div class="line"></div> <!-- Winning line -->
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="reset">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
